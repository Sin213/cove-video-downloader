name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Install HandBrake CLI via Chocolatey
        shell: pwsh
        run: |
          choco install handbrake-cli -y
          # Must search chocolatey\lib only — chocolatey\bin contains shim wrappers,
          # not the real binary. The shim causes "Cannot find file" at runtime.
          $hb = Get-ChildItem "C:\ProgramData\chocolatey\lib" -Recurse -Filter "HandBrakeCLI.exe" | Select-Object -First 1
          if (-not $hb) { throw "HandBrakeCLI.exe not found in chocolatey\lib after install." }
          Write-Host "Found HandBrakeCLI at: $($hb.FullName)"
          Copy-Item $hb.FullName -Destination "HandBrakeCLI.exe"
          Write-Host "Copied. Size: $((Get-Item 'HandBrakeCLI.exe').Length) bytes"

      - name: Download ffmpeg for bundling
        shell: pwsh
        run: |
          $url = "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffexe = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if (-not $ffexe) { throw "ffmpeg.exe not found in archive." }
          Copy-Item $ffexe.FullName -Destination "ffmpeg.exe"
          Write-Host "ffmpeg.exe size: $((Get-Item 'ffmpeg.exe').Length) bytes"
          Remove-Item -Recurse -Force ffmpeg_tmp, ffmpeg.zip

      - name: Convert PNG icon to ICO
        shell: pwsh
        run: python -c "from PIL import Image; img = Image.open('cove_icon.png').convert('RGBA'); img.save('cove_icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])"

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "CoveVideoDownloader" `
            --icon "cove_icon.ico" `
            --add-data "cove_icon.png;." `
            --add-binary "HandBrakeCLI.exe;." `
            --add-binary "ffmpeg.exe;." `
            cove_video_downloader.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: CoveVideoDownloader-Windows
          path: dist/CoveVideoDownloader.exe

      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CoveVideoDownloader.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
