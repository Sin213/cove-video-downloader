name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Download yt-dlp.exe
        shell: pwsh
        run: Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"

      - name: Install HandBrake CLI via Chocolatey
        shell: pwsh
        run: |
          choco install handbrake-cli -y
          $hb = Get-ChildItem "C:\ProgramData\chocolatey" -Recurse -Filter "HandBrakeCLI.exe" | Select-Object -First 1
          if (-not $hb) { throw "HandBrakeCLI.exe not found after install." }
          Copy-Item $hb.FullName -Destination "HandBrakeCLI.exe"

      - name: Convert PNG icon to ICO
        shell: pwsh
        run: python -c "from PIL import Image; img = Image.open('cove_icon.png').convert('RGBA'); img.save('cove_icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])"

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "CoveVideoDownloader" `
            --icon "cove_icon.ico" `
            --add-data "cove_icon.png;." `
            --add-binary "yt-dlp.exe;." `
            --add-binary "HandBrakeCLI.exe;." `
            cove_video_downloader.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoveVideoDownloader-Windows
          path: dist/CoveVideoDownloader.exe

      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CoveVideoDownloader.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
