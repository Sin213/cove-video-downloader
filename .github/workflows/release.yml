name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (no leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install system deps (libfuse2 for AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 unzip

      - name: Install npm deps
        run: npm ci

      - name: Build Linux AppImage + deb
        run: npm run dist:linux -- --publish never

      - name: Generate SHA256 checksums
        run: |
          cd release
          for f in *.AppImage *.deb; do
            [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
          done

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            release/*.AppImage
            release/*.AppImage.sha256
            release/*.deb
            release/*.deb.sha256
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build Windows Setup + Portable
        run: npm run dist:win -- --publish never

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release
          for f in *-Setup.exe *-Portable.exe; do
            [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
          done

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            release/*-Setup.exe
            release/*-Setup.exe.sha256
            release/*-Portable.exe
            release/*-Portable.exe.sha256
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-builds/*
            artifacts/windows-builds/*
          fail_on_unmatched_files: true
          generate_release_notes: true
