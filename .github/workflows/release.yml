name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (no leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install system deps (libfuse2 for AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 unzip

      - name: Install npm deps
        run: npm ci

      - name: Build Linux AppImage
        run: npm run dist:linux -- --publish never

      - name: Attach AppImage to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Upload AppImage as workflow artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build Windows Setup + Portable
        run: npm run dist:win -- --publish never

      - name: Attach Windows artifacts to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*-Setup.exe
            release/*-Portable.exe
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Upload Windows artifacts as workflow artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            release/*-Setup.exe
            release/*-Portable.exe
          if-no-files-found: error
